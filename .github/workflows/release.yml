name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o release/genmit-windows-amd64.exe .

      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o release/genmit-linux-amd64 .

      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o release/genmit-linux-arm64 .

      - name: Build macOS amd64 (Intel)
        run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o release/genmit-darwin-amd64 .

      - name: Build macOS arm64 (Apple Silicon)
        run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o release/genmit-darwin-arm64 .

      - name: Create checksums
        run: cd release && sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            release/genmit-windows-amd64.exe
            release/genmit-linux-amd64
            release/genmit-linux-arm64
            release/genmit-darwin-amd64
            release/genmit-darwin-arm64
            release/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
